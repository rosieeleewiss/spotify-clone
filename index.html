<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone - Local Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <nav class="sidebar-left">
            <div class="library-header">
                <div>
                    <i class="fa-solid fa-book"></i>
                    <span>Your Library</span>
                </div>
                <button class="add-btn"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div class="filter-buttons">
                <button class="badge-btn active">Playlists</button>
                <button class="badge-btn">Artists</button>
            </div>
            <div class="upload-section">
                <label for="music-upload" class="upload-label">
                    <i class="fa-solid fa-folder-open"></i> MP3 Klasörü Seç / Yükle
                </label>
                <input type="file" id="music-upload" accept="audio/mp3" multiple webkitdirectory directory style="display: none;">
            </div>
            <ul class="playlist-list" id="playlist-container">
                <li class="playlist-item active-track">
                    <i class="fa-solid fa-music"></i>
                    <div>
                        <p class="track-name">Liked Songs</p>
                        <p class="track-sub">Playlist • rosieeleewiss</p>
                    </div>
                </li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-nav">
                <div class="nav-arrows">
                    <button><i class="fa-solid fa-chevron-left"></i></button>
                    <button><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="What do you want to play?" class="search-bar">
                </div>
            </header>
            
            <section class="content-section">
                <h2>Recommended Stations</h2>
                <div class="card-grid">
                    <div class="card">
                        <div class="card-image" style="background: linear-gradient(135deg, #2af598 0%, #009efd 100%);">
                            <i class="fa-solid fa-radio card-icon"></i>
                        </div>
                        <h3>Siesta Freestyle</h3>
                        <p>With Lewis OfMan, Kali Uchis...</p>
                    </div>
                    <div class="card">
                        <div class="card-image" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);">
                            <i class="fa-solid fa-radio card-icon"></i>
                        </div>
                        <h3>Dr. Dog</h3>
                        <p>With Beach House, Her's...</p>
                    </div>
                    <div class="card">
                        <div class="card-image" style="background: linear-gradient(135deg, #f12711 0%, #f5af19 100%);">
                            <i class="fa-solid fa-radio card-icon"></i>
                        </div>
                        <h3>Surf Curse</h3>
                        <p>With The Drums, Eyedress...</p>
                    </div>
                </div>
            </section>
        </main>

        <aside class="sidebar-right">
            <div class="right-header">
                <h3>~T^T"</h3>
            </div>
            <div class="now-playing-art">
                <i class="fa-solid fa-compact-disc fa-spin-slow"></i>
            </div>
            <div class="track-details">
                <h2 class="now-playing-title" id="current-title">Notion</h2>
                <p class="now-playing-artist" id="current-artist">The Rare Occasions</p>
            </div>
        </aside>

        <footer class="player-bar">
            <div class="player-info">
                <div class="mini-art"></div>
                <div>
                    <h4 id="bar-title">Notion</h4>
                    <p id="bar-artist">The Rare Occasions</p>
                </div>
                <button class="heart-btn"><i class="fa-regular fa-heart"></i></button>
            </div>
            
            <div class="player-controls">
                <div class="buttons">
                    <button id="shuffle"><i class="fa-solid fa-shuffle"></i></button>
                    <button id="prev"><i class="fa-solid fa-backward-step"></i></button>
                    <button id="play-trigger" class="play-btn-main"><i class="fa-solid fa-circle-play"></i></button>
                    <button id="next"><i class="fa-solid fa-forward-step"></i></button>
                    <button id="repeat"><i class="fa-solid fa-repeat"></i></button>
                </div>
                <div class="progress-bar">
                    <span class="time" id="current-time">0:00</span>
                    <input type="range" min="0" max="100" value="0" class="slider" id="progress-slider">
                    <span class="time" id="total-time">0:00</span>
                </div>
            </div>
            
            <div class="player-actions">
                <button><i class="fa-solid fa-microphone"></i></button>
                <button><i class="fa-solid fa-list"></i></button>
                <button><i class="fa-solid fa-volume-high"></i></button>
                <input type="range" min="0" max="100" value="70" class="slider volume" id="volume-slider">
            </div>
        </footer>

    </div>
    <script src="app.js"></script>
</body>
</html>
