<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <nav class="sidebar-left">
            <div class="library-header">
                <h2>Your Library</h2>
                <button>+</button>
            </div>
            <ul class="playlist-list">
                <li>Liked Songs</li>
                <li>~T^T"</li>
                <li>~Slam Dunkk"</li>
                <li>My Playlist #4</li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-nav">
                <input type="text" placeholder="What do you want to play?" class="search-bar">
            </header>
            
            <section class="content-section">
                <h2>Recommended Stations</h2>
                <div class="card-grid">
                    <div class="card">
                        <div class="card-image" style="background: #1db954;"></div>
                        <h3>Siesta Freestyle</h3>
                    </div>
                    <div class="card">
                        <div class="card-image" style="background: #ff6b6b;"></div>
                        <h3>Dr. Dog</h3>
                    </div>
                    <div class="card">
                        <div class="card-image" style="background: #feca57;"></div>
                        <h3>Surf Curse</h3>
                    </div>
                </div>
            </section>
        </main>

        <aside class="sidebar-right">
            <h2>~T^T"</h2>
            <div class="now-playing-art"></div>
            <h3 class="now-playing-title">Notion</h3>
            <p class="now-playing-artist">The Rare Occasions</p>
        </aside>

        <footer class="player-bar">
            <div class="player-info">
                <h4>Notion</h4>
                <p>The Rare Occasions</p>
            </div>
            <div class="player-controls">
                <div class="buttons">
                    <button>⏮</button>
                    <button class="play-btn">▶</button>
                    <button>⏭</button>
                </div>
                <div class="progress-bar">
                    <span class="time">0:01</span>
                    <input type="range" min="0" max="100" value="0" class="slider">
                    <span class="time">3:16</span>
                </div>
            </div>
            <div class="player-actions">
                <input type="range" min="0" max="100" value="50" class="slider volume">
            </div>
        </footer>

    </div>
    <script src="app.js"></script>
</body>
</html>
